<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Decode render equipment flow</title>
  <desc id="desc">A diagram showing how an NCF code is decoded, rebuilt into geometry, assigned grip metadata, and equipped by the avatar runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#090d13"/><stop offset="1" stop-color="#17120c"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#ffd07a"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#ffd07a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8f2e8}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#cfc1af}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8f2e8}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#d8c8b6}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#ffe099}.line{stroke:#ffd07a;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="250" fill="#ff7a2a" opacity=".09"/><circle cx="210" cy="620" r="270" fill="#00c2ff" opacity=".07"/>
  <text x="70" y="78" class="label">FORGE RUNTIME LOGIC</text>
  <text x="70" y="132" class="title">Decode paths keep old items loadable.</text>
  <text x="70" y="168" class="copy">The stable boundary is the compact code. Mesh generation and avatar attachment are rebuild steps, not stored editor state.</text>
  <g transform="translate(70 258)"><rect class="card" width="202" height="180"/><text x="24" y="42" class="head">NCF input</text><text x="24" y="78" class="mono">NCF1.*</text><text x="24" y="112" class="small">base64url bytes</text><text x="24" y="142" class="small">local storage entry</text></g>
  <path class="line" d="M272 348 H334"/>
  <g transform="translate(356 230)"><rect class="card" width="250" height="236"/><text x="24" y="42" class="head">decodeForgeCode()</text><text x="24" y="78" class="small">read version bits</text><text x="24" y="108" class="small">legacy solid runs</text><text x="24" y="138" class="small">appearance blueprint</text><text x="24" y="168" class="small">coordinate palette</text><text x="24" y="200" class="mono">version 3 / 4</text></g>
  <path class="line" d="M606 348 H668"/>
  <g transform="translate(690 230)"><rect class="card" width="238" height="236"/><text x="24" y="42" class="head">Geometry rebuild</text><text x="24" y="78" class="small">quads or components</text><text x="24" y="108" class="small">vertex colors</text><text x="24" y="138" class="small">standard material</text><text x="24" y="168" class="small">shadow flags</text><text x="24" y="200" class="mono">THREE.Mesh</text></g>
  <path class="line" d="M928 348 H990"/>
  <g transform="translate(1012 258)"><rect class="card" width="198" height="180"/><text x="24" y="42" class="head">Equipment</text><text x="24" y="78" class="small">grip metadata</text><text x="24" y="108" class="small">avatar hand</text><text x="24" y="138" class="small">preview runtime</text></g>
  <g transform="translate(258 542)"><rect class="card" width="764" height="86"/><text x="28" y="36" class="head">Compatibility rule</text><text x="28" y="62" class="small">New forge tools can add richer blueprints, but decode support must keep existing saved items loadable.</text></g>
</svg>
